<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For You</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fdf8f4;
      --card-bg: #fffcf9;
      --ink: #2c2320;
      --ink-light: #6b5c57;
      --accent: #c9786a;
      --accent-soft: #f0ddd9;
      --border: #e8dcd7;
      --shadow: rgba(100, 60, 50, 0.10);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--ink);
      padding: 24px;
      overflow: hidden;
    }

    /* Subtle background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, #f5e8e4 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, #ede4f0 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .scene {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      width: 100%;
      max-width: 680px;
    }

    /* Top label */
    .label {
      font-size: 0.78rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    /* Card wrapper */
    .card-wrap {
      width: 100%;
      position: relative;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 56px 60px;
      box-shadow:
        0 2px 8px var(--shadow),
        0 20px 60px rgba(100,60,50,0.07);
      position: relative;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
      min-height: 340px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Decorative corner marks */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      border-color: var(--accent-soft);
      border-style: solid;
    }
    .card::before { top: 18px; left: 18px; border-width: 1px 0 0 1px; }
    .card::after  { bottom: 18px; right: 18px; border-width: 0 1px 1px 0; }

    /* Card content area */
    .card-inner {
      position: relative;
      overflow: hidden;
    }

    .card-text {
      font-size: 1.18rem;
      line-height: 2;
      font-weight: 300;
      color: var(--ink);
      white-space: pre-wrap;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .card-text.exit-left  { opacity: 0; transform: translateX(-28px); }
    .card-text.exit-right { opacity: 0; transform: translateX(28px); }
    .card-text.enter-left  { opacity: 0; transform: translateX(28px); }
    .card-text.enter-right { opacity: 0; transform: translateX(-28px); }
    .card-text.active { opacity: 1; transform: translateX(0); }

    /* Card footer */
    .card-footer {
      margin-top: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-counter {
      font-family: 'Lato', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      color: var(--ink-light);
      font-weight: 300;
    }

    .card-divider {
      height: 1px;
      flex: 1;
      background: var(--border);
      margin: 0 20px;
    }

    /* Navigation */
    .nav {
      display: flex;
      align-items: center;
      gap: 20px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.6s;
    }

    .nav-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--ink-light);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.22s ease;
      box-shadow: 0 2px 8px var(--shadow);
    }

    .nav-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
      transform: scale(1.06);
      box-shadow: 0 4px 16px var(--shadow);
    }

    .nav-btn:disabled {
      opacity: 0.28;
      cursor: default;
    }

    .nav-btn svg {
      width: 18px;
      height: 18px;
      stroke-width: 1.5;
    }

    /* Dot indicators */
    .dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .dot.active {
      background: var(--accent);
      transform: scale(1.25);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 560px) {
      .card { padding: 36px 28px; }
      .card-text { font-size: 1.06rem; line-height: 1.9; }
    }
  </style>
</head>
<body>

<div class="scene">

  <span class="label">A few words, just for you</span>

  <div class="card-wrap">
    <div class="card">
      <div class="card-inner">
        <div class="card-text active" id="cardText"></div>
      </div>
      <div class="card-footer">
        <span class="card-counter" id="counter"></span>
        <div class="card-divider"></div>
      </div>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn" id="prevBtn" aria-label="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <div class="dots" id="dots"></div>

    <button class="nav-btn" id="nextBtn" aria-label="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>

</div>

<script>
  // ── ✏️  YOUR MESSAGES – edit these freely ────────────────────────────────
  const messages = [
    `I've been turning these words over in my mind for a long time now, never quite finding the right moment or the courage to say them out loud.

But some things deserve to be said, even when it's hard — especially when it's hard.

So here I am, giving these feelings the space they've always deserved, hoping you'll read every word the way it was meant: with all the warmth and sincerity I have.`,

    `There's something about you that changes the quality of a room the moment you walk into it.

I've noticed it every single time — the way the air feels a little lighter, the way conversations become more interesting, the way I find myself wanting to stay just a little longer than I planned.

You probably don't even realize you do it. That's one of my favorite things about you.`,

    `I've thought about what I'd say if I ever got the chance, and I always imagined something perfectly composed — wise, maybe a little poetic.

Instead I just keep coming back to the simplest truth: being around you feels like the best version of whatever day it is.

That's not nothing. That's actually everything.`,

    `You've made me laugh harder than I expected, think more carefully than I'm used to, and feel more seen than I knew I needed.

Those aren't small things. Those are the kinds of things that stay with a person.

They've stayed with me.`,

    `I don't know exactly what comes next, or if you feel even a fraction of what I'm trying to say here.

But I know I'd regret saying nothing far more than I'd regret saying too much.

So if these pages reach you and you recognize yourself in them — know that it's all true, and it's all meant for you.

With everything I've got,
— me.`,
  ];
  // ─────────────────────────────────────────────────────────────────────────

  let current = 0;
  const textEl   = document.getElementById('cardText');
  const counterEl = document.getElementById('counter');
  const prevBtn  = document.getElementById('prevBtn');
  const nextBtn  = document.getElementById('nextBtn');
  const dotsEl   = document.getElementById('dots');

  // Build dots
  messages.forEach((_, i) => {
    const d = document.createElement('button');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.setAttribute('aria-label', `Go to card ${i + 1}`);
    d.addEventListener('click', () => goTo(i, i > current ? 'left' : 'right'));
    dotsEl.appendChild(d);
  });

  function updateUI() {
    counterEl.textContent = `${current + 1} / ${messages.length}`;
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === messages.length - 1;
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === current);
    });
  }

  function goTo(index, dir) {
    if (index === current) return;
    const exitClass  = dir === 'left'  ? 'exit-left'  : 'exit-right';
    const enterClass = dir === 'left'  ? 'enter-left' : 'enter-right';

    textEl.classList.remove('active');
    textEl.classList.add(exitClass);

    setTimeout(() => {
      current = index;
      textEl.textContent = messages[current];
      textEl.classList.remove(exitClass);
      textEl.classList.add(enterClass);

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          textEl.classList.remove(enterClass);
          textEl.classList.add('active');
          updateUI();
        });
      });
    }, 320);
  }

  prevBtn.addEventListener('click', () => {
    if (current > 0) goTo(current - 1, 'right');
  });

  nextBtn.addEventListener('click', () => {
    if (current < messages.length - 1) goTo(current + 1, 'left');
  });

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft'  && current > 0)                   goTo(current - 1, 'right');
    if (e.key === 'ArrowRight' && current < messages.length - 1) goTo(current + 1, 'left');
  });

  // Init
  textEl.textContent = messages[0];
  updateUI();
</script>
</body>
</html>
